<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>むらびと君(アドオン用) - ドキュメント</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    min-height:100vh;
    font-family:
    -apple-system,
    BlinkMacSystemFont,
    "Segoe UI",
    "Hiragino Sans",
    "Yu Gothic UI",
    sans-serif;

    background:
    linear-gradient(
        135deg,
        #F1F8E9,
        #E8F5E9
    );

    color:#333;
}


/* メイン */

.container{

    max-width:900px;

    margin:auto;

    padding:70px 20px;

}


/* ヘッダー */

.header{

    text-align:center;

    margin-bottom:40px;

}


.logo{

    width:90px;

    height:90px;

    margin:auto;

    display:flex;

    align-items:center;

    justify-content:center;

    border-radius:50%;

    background:#8BC34A;

    color:white;

    font-size:40px;

    box-shadow:
    0 10px 25px rgba(76,175,80,.25);

}


h1{

    margin-top:25px;

    color:#2E7D32;

    font-size:36px;

}


.subtitle{

    color:#558B2F;

    font-size:15px;

}



/* カード */

.card{

    background:white;

    padding:35px;

    border-radius:20px;

    border-top:6px solid #8BC34A;

    box-shadow:

    0 10px 30px rgba(46,125,50,.12);

}



/* 見出し */

.card h2{

    margin-top:0;

    color:#2E7D32;

    font-size:22px;

}



/* メニュー */

.menu{

    list-style:none;

    padding:0;

    margin:25px 0 0;

}


.menu li{

    margin:15px 0;

}



.menu a{

    display:flex;

    align-items:center;

    gap:12px;

    padding:15px 20px;

    background:#F1F8E9;

    border-radius:12px;

    color:#33691E;

    text-decoration:none;

    font-weight:bold;

    transition:.2s;

}



.menu a:hover{

    background:#DCEDC8;

    transform:translateX(5px);

}



/* アイコン */

.icon{

    font-size:20px;

}



/* フッター */

.note{

    margin-top:30px;

    text-align:center;

    color:#689F38;

    font-size:13px;

}



/* スマホ対応 */

@media(max-width:600px){

    h1{

        font-size:28px;

    }


    .card{

        padding:25px;

    }

}


</style>

</head>


<body>


<div class="container">


<div class="header">


<div class="logo">
🌱
</div>
